version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: milmat-backend:latest
    container_name: milmat-backend-app
    restart: always
    ports:
      - "8000:80"
    volumes:
      - db-data:/var/www/html/database
      - storage-data:/var/www/html/storage
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=base64:XLJwEJQ2FytCe0WiNvQEA3a3oPWHs50O/dh/Uakty7k=
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite

volumes:
  db-data:
  storage-data:
